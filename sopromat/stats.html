": 283, "id": "s485", "oldn": 283, "q": "Какие напряжения возникают при кручении в сечениях вала, перпендикулярных его оси?"}, {"n": 284, "id": "s486", "oldn": 284, "q": "61. Коэффициент приведения длины стержня при исследовании устойчивости учитывает"}, {"n": 285, "id": "s487", "oldn": 285, "q": "63. Что означает эта зависимость: σ = M(cosφ/Jy·z1 + sinφ/Jz·y1)"}, {"n": 286, "id": "s488", "oldn": 286, "q": "Что означает это выражение: σ = -P(1/F + Yp·y/Jz + Zp·z/Jy)"}, {"n": 287, "id": "s491", "oldn": 287, "q": "Сколько главных напряжений, отличных от нуля, определяют плоское напряжённое состояние тела?"}, {"n": 288, "id": "s415", "oldn": 288, "q": "Определите размерность температурного коэффициента, употребляемого при расчете напряжений в конструкции при изменении температуры среды"}, {"n": 289, "id": "s439", "oldn": 289, "q": "В формуле P/F + γ·l ≤ [σ] что означает член γ·l"}, {"n": 290, "id": "s452", "oldn": 290, "q": "Сила, приложенная к абсолютно твердому телу, является вектором"}, {"n": 291, "id": "s453", "oldn": 291, "q": "Сила характеризуется"}, {"n": 292, "id": "s454", "oldn": 292, "q": "Несвободное тело можно рассматривать как свободное"}, {"n": 293, "id": "s455", "oldn": 293, "q": "Реакция гибкой связи направлена"}, {"n": 294, "id": "s456", "oldn": 294, "q": "Реакция гладкой опоры направлена"}, {"n": 295, "id": "s457", "oldn": 295, "q": "Плечом силы относительно центра является"}, {"n": 296, "id": "s458", "oldn": 296, "q": "Алгебраическим моментом силы относительно центра называется"}, {"n": 297, "id": "s459", "oldn": 297, "q": "Единица измерения момента силы в системе СИ"}, {"n": 298, "id": "s478", "oldn": 298, "q": "Что означает выражение K = E/(3(1-2μ))?"}, {"n": 299, "id": "s479", "oldn": 299, "q": "Что означает выражение: ε₀ = σср/K = (σ1+σ2+σ3)/3K"}, {"n": 300, "id": "s489", "oldn": 300, "q": "78. Какова роль трения при разрушении материалов сжатием?"}, {"n": 301, "id": "s490", "oldn": 301, "q": "Что называется внешней нормалью к сечению тела"}];
var GNS = 'sessia-sopromat', GAPI = 'https://abacus.jasoncameron.dev', STORE = 'sopromat-trainer-v1';
var mine = {}, mineIdKeys = false;
try { var s = JSON.parse(localStorage.getItem(STORE)||'{}'); mine = {att: s.att||{}, wrong: s.wrong||{}, learn: s.learn||{}}; mineIdKeys=(s.idkeys===true); } catch(e){ mine = {att:{},wrong:{},learn:{}}; }
function mkey(q){ return mineIdKeys ? (q.id||String(q.n)) : String(q.oldn||q.n); }
var G = {};
var CK = 'gstats-full-' + GNS;
try { var _c = JSON.parse(localStorage.getItem(CK) || 'null');
      if(_c && _c.d && Date.now() - _c.t < 3600000){ G = _c.d; } } catch(e){}
function esc(t){ var d = document.createElement('i'); d.textContent = t; return d.innerHTML; }
function saveCache(){ try{ localStorage.setItem(CK, JSON.stringify({t: Date.now(), d: G})); }catch(e){} }
function sweep(keys, onDone){
  /* бережный обход: 2 потока, пауза между стартами, длинные ретраи под рейт-лимит */
  var i = 0, act = 0, done = 0;
  var BACKOFF = [1500, 4000, 9000, 18000];
  function one(t){
    act++;
    var attempt = 0;
    function fin1(){ act--; done++;
      if(done % 15 === 0){ render(); saveCache(); }
      if(done >= keys.length){ onDone(); } else { setTimeout(next, 90); } }
    function go(){
      fetch(GAPI + '/get/' + GNS + '/q' + t[2] + t[0])
        .then(function(r){ if(r.status === 404) return null; if(!r.ok) throw 0; return r.json(); })
        .then(function(j){ var o = G[t[1]] || (G[t[1]] = {a:0, w:0}); o[t[0]] = (j && j.value) || 0; fin1(); })
        .catch(function(){
          if(attempt < BACKOFF.length){ setTimeout(go, BACKOFF[attempt++] + Math.random() * 500); }
          else { fin1(); } });
    }
    go();
  }
  function next(){ while(act < 2 && i < keys.length) one(keys[i++]); }
  if(keys.length) next(); else onDone();
}
function load(){
  var ka = QS.map(function(q){ return ['a', q.n, q.oldn||q.n]; });
  sweep(ka, function(){
    var kw = QS.filter(function(q){ var g = G[q.n]; return g && g.a > 0; })
               .map(function(q){ return ['w', q.n, q.oldn||q.n]; });
    sweep(kw, function(){ saveCache(); render(); });
  });
}
var sortBy = 'grate';
function render(){
  var ga = 0, gw = 0, hard = 0;
  QS.forEach(function(q){ var g = G[q.n]; if(g && g.a){ ga += g.a; gw += g.w; if(g.w/g.a >= 0.4) hard++; } });
  var myAtt = 0, myW = 0, myM = 0;
  QS.forEach(function(q){ var k=mkey(q); myAtt += mine.att[k]||0; myW += mine.wrong[k]||0; if((mine.learn[k]||0) >= 3) myM++; });
  document.getElementById('cards').innerHTML =
    '<div class="c a"><div class="v">' + ga + '</div><div class="l">ответов группы</div></div>' +
    '<div class="c b"><div class="v">' + (ga ? Math.round(100*gw/ga) : 0) + '%</div><div class="l">ошибок группы</div></div>' +
    '<div class="c b"><div class="v">' + hard + '</div><div class="l">сложных (&ge;40%)</div></div>' +
    '<div class="c"><div class="v">' + myAtt + '</div><div class="l">моих ответов</div></div>' +
    '<div class="c b"><div class="v">' + myW + '</div><div class="l">моих ошибок</div></div>' +
    '<div class="c g"><div class="v">' + myM + '</div><div class="l">усвоено мной</div></div>';
  var rows = QS.slice();
  function grate(q){ var g = G[q.n]; return (g && g.a) ? g.w/g.a : -1; }
  function mrate(q){ var k=mkey(q), a = mine.att[k]||0; return a ? (mine.wrong[k]||0)/a : -1; }
  if(sortBy === 'num') rows.sort(function(x,y){ return x.n - y.n; });
  else if(sortBy === 'mine') rows.sort(function(x,y){ return mrate(y) - mrate(x) || x.n - y.n; });
  else rows.sort(function(x,y){ return grate(y) - grate(x) || x.n - y.n; });
  var h = '<table><thead><tr>' +
    '<th onclick="sortBy=\'num\';render()">№</th><th>Вопрос</th>' +
    '<th onclick="sortBy=\'grate\';render()">Группа: ошибки ▾</th>' +
    '<th onclick="sortBy=\'mine\';render()">Мои</th></tr></thead><tbody>';
  rows.forEach(function(q){
    var k=mkey(q), g = G[q.n], a = mine.att[k]||0, w = mine.wrong[k]||0;
    var gp = (g && g.a) ? Math.round(100*g.w/g.a) : null;
    h += '<tr><td class="num">' + q.n + '</td><td class="q">' + esc(q.q) + '</td><td>' +
      (gp === null ? '<span style="color:var(--muted);font-size:12px">нет данных</span>'
        : '<div class="bar"><i style="width:' + gp + '%"></i><span>' + gp + '% из ' + g.a + '</span></div>') +
      '</td><td class="num">' + (a ? ('<span class="' + (w ? 'mineB' : 'mineG') + '">' + w + '</span>/' + a) : '—') + '</td></tr>';
  });
  h += '</tbody></table>';
  document.getElementById('tbl').innerHTML = h;
  document.getElementById('tbl').classList.remove('load');
}
render(); load();
</script>
