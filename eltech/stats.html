    '<div class="c b"><div class="v">' + myW + '</div><div class="l">моих ошибок</div></div>' +
    '<div class="c g"><div class="v">' + myM + '</div><div class="l">усвоено мной</div></div>';
  var rows = QS.slice();
  function grate(q){ var g = G[q.n]; return (g && g.a) ? g.w/g.a : -1; }
  function mrate(q){ var k=mkey(q), a = mine.att[k]||0; return a ? (mine.wrong[k]||0)/a : -1; }
  if(sortBy === 'num') rows.sort(function(x,y){ return x.n - y.n; });
  else if(sortBy === 'mine') rows.sort(function(x,y){ return mrate(y) - mrate(x) || x.n - y.n; });
  else rows.sort(function(x,y){ return grate(y) - grate(x) || x.n - y.n; });
  var h = '<table><thead><tr>' +
    '<th onclick="sortBy=\'num\';render()">№</th><th>Вопрос</th>' +
    '<th onclick="sortBy=\'grate\';render()">Группа: ошибки ▾</th>' +
    '<th onclick="sortBy=\'mine\';render()">Мои</th></tr></thead><tbody>';
  rows.forEach(function(q){
    var k=mkey(q), g = G[q.n], a = mine.att[k]||0, w = mine.wrong[k]||0;
    var gp = (g && g.a) ? Math.round(100*g.w/g.a) : null;
    h += '<tr><td class="num">' + q.n + '</td><td class="q">' + esc(q.q) + '</td><td>' +
      (gp === null ? '<span style="color:var(--muted);font-size:12px">нет данных</span>'
        : '<div class="bar"><i style="width:' + gp + '%"></i><span>' + gp + '% из ' + g.a + '</span></div>') +
      '</td><td class="num">' + (a ? ('<span class="' + (w ? 'mineB' : 'mineG') + '">' + w + '</span>/' + a) : '—') + '</td></tr>';
  });
  h += '</tbody></table>';
  document.getElementById('tbl').innerHTML = h;
  document.getElementById('tbl').classList.remove('load');
}
render(); load();
</script>
</div></body></html>
